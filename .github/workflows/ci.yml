name: CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['**/*.md', 'docs/**']   # docs-only changes don't affect the build
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**']   # skip the full Windows build for docs-only PRs

jobs:
  build-windows:
    # Pinned to windows-2022 for the VS 2022 (v143) toolset. GitHub's
    # windows-latest moved to a VS2026-only image (windows-2025-vs2026) on
    # 2026-06-08, which breaks `cmake -G "Visual Studio 17 2022"` at project().
    # MuPDF's vcxproj + ImportMuPDF.cmake force v143, so we stay on VS 2022.
    runs-on: windows-2022

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Version sync gate
        shell: pwsh
        run: ./scripts/check-version-sync.ps1

      - name: Unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1

      - name: Upload exe artifact
        uses: actions/upload-artifact@v5
        with:
          name: litepdf-phase0
          path: build/Release/litepdf.exe
          if-no-files-found: error
