# Companion no-op so the required `build-windows` status check is still
# reported for docs-only PRs. The real CI (ci.yml) skips the Windows build on
# docs-only changes via `paths-ignore`; without this companion, a *required*
# `build-windows` check would sit "Expected — Waiting for status to be
# reported" forever and permanently block the PR from merging.
#
# This job emits a green `build-windows` check for exactly the path set that
# ci.yml ignores, so docs-only PRs stay mergeable while still satisfying the
# branch-protection rule.
#
# Mixed (code + docs) PR: both this job and the real ci.yml build-windows run.
# Branch protection requires every check run of a given name to succeed, so the
# real Windows build still gates the merge — this no-op cannot mask a real
# build failure.
#
# IMPORTANT: keep the `paths` filter below byte-identical to ci.yml's
# `paths-ignore`. They are two halves of one switch: ci.yml runs the real build
# unless every changed file matches these patterns; this companion runs when at
# least one changed file matches them. Drift between the two lists reopens the
# stuck-PR hole this file exists to close.
name: CI (docs-only no-op)

on:
  pull_request:
    paths: ['**/*.md', 'docs/**']

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: No Windows build required for docs-only changes
        run: |
          echo "Docs-only change: the real Windows build is skipped by ci.yml paths-ignore."
          echo "Reporting success so the required 'build-windows' check is satisfied."
